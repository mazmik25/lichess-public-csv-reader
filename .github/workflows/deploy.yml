# Deploys public/ to GitHub Pages on every push to main.
# The site runs fully client-side: the visitor drops the puzzle CSV onto the
# page and it is indexed in the browser (see public/local-source.js).
#
# One-time setup: repo Settings -> Pages -> Source = "GitHub Actions".
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # Skips deployment when the pushed commit comes from a merged PR
  # that carries the "no-deployment" label. Manual runs always deploy.
  check-label:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          labels=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            --jq '[.[].labels[].name] | join(",")')
          echo "PR labels for ${{ github.sha }}: ${labels:-<none>}"
          if [[ ",$labels," == *",no-deployment,"* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: check-label
    if: needs.check-label.outputs.skip != 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deployment
        uses: actions/deploy-pages@v4
